bind r source-file "${HOME}/.config/tmux/tmux.conf"
source-file "${HOME}/.config/tmux/navigator.tmux"
source-file "${HOME}/.config/tmux/theme.tmux"

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

bind | split-window -h
bind - split-window -v
unbind '"'
unbind '%'

set-window-option -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# fzf integrations (Home Manager plugin paths)
bind s run-shell "${pkgs.tmuxPlugins.tmux-fzf}/share/tmux-plugins/tmux-fzf/scripts/session.sh switch"
bind w run-shell "${pkgs.tmuxPlugins.tmux-fzf}/share/tmux-plugins/tmux-fzf/scripts/window.sh switch"
bind f run-shell "${pkgs.tmuxPlugins.tmux-fzf}/share/tmux-plugins/tmux-fzf/scripts/window.sh switch"

